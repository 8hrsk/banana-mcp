name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binaries
        run: |
          make release
          
          # Compress binaries for release
          cd release
          for dir in */; do
            dirname=${dir%/}
            if [[ "$dirname" == *"windows"* ]]; then
              zip -r "${dirname}.zip" "$dirname"
            else
              tar -czvf "${dirname}.tar.gz" "$dirname"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/*.zip
          generate_release_notes: true
